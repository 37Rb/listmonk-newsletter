services:
  blog-home:
    image: ghcr.io/iloveitaly/listmonk-newsletter:latest
    restart: always
    env_file:
      - .envs/blog-home.env
    environment:
      # the container will *not* assume the TZ of the host without this
      - TZ=${TZ}
    volumes:
      - blog-home-data:/app/data

  blog-business:
    image: ghcr.io/iloveitaly/listmonk-newsletter:latest
    restart: always
    env_file:
      - .envs/blog-business.env
    environment:
      - TZ=${TZ}
    volumes:
      - blog-business-data:/app/data

volumes:
  blog-home-data:
  blog-business-data:
